<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD de Listas</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- ===== Tela inicial: boas-vindas + login ===== -->
  <div id="tela-login" class="tela-login">
    <div class="login-card">
      <div class="login-logo"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h4"/></svg></div>
      <h1>CRUD de Listas</h1>
      <p class="login-sub">Organize suas tarefas com listas, notas e checklists.</p>

      <form id="form-login" class="login-form">
        <input id="login-email" type="email" placeholder="E-mail" autocomplete="username" required />
        <input id="login-senha" type="password" placeholder="Senha" autocomplete="current-password" required />
        <button type="submit">Entrar</button>
        <p id="login-erro" class="login-erro" hidden></p>
      </form>

      <form id="form-cadastro" class="login-form" hidden>
        <input id="cad-nome" type="text" placeholder="Nome" required />
        <input id="cad-email" type="email" placeholder="E-mail" required />
        <input id="cad-senha" type="password" placeholder="Senha (mín. 4 caracteres)" minlength="4" required />
        <button type="submit">Criar conta</button>
        <p id="cad-erro" class="login-erro" hidden></p>
      </form>

      <p class="login-troca">
        <a id="ir-cadastro" href="#">Não tem conta? <b>Cadastre-se</b></a>
        <a id="ir-login" href="#" hidden>Já tem conta? <b>Entrar</b></a>
      </p>
    </div>
  </div>

  <!-- ===== App ===== -->
  <div class="app" id="app" hidden>
    <aside class="sidebar">
      <div class="topo-side">
        <h1 class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h4"/></svg> Listas</h1>
        <button id="btn-tema" class="btn-tema" title="Alternar tema" aria-label="Alternar tema"></button>
      </div>
      <div class="busca-wrap">
        <svg class="busca-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="busca" class="busca" type="search" placeholder="Buscar tarefas..." />
      </div>
      <ul id="listas" class="listas"></ul>
      <button id="btn-nova-lista" class="btn-nova-lista">Nova lista</button>
      <div class="user-bar">
        <span class="avatar" id="user-avatar">?</span>
        <span class="user-nome" id="user-nome">—</span>
        <button id="btn-logout" class="btn-tema" title="Sair" aria-label="Sair"></button>
      </div>
    </aside>

    <main class="conteudo">
      <header class="cabecalho">
        <div class="titulo-lista">
          <span id="ponto-cor" class="ponto-cor"></span>
          <h2 id="titulo-lista">Selecione uma lista</h2>
        </div>
        <button id="btn-excluir-lista" class="btn-perigo" title="Excluir lista" aria-label="Excluir lista" hidden></button>
      </header>

      <div id="barra-ferramentas" class="ferramentas" hidden>
        <label class="campo-inline">Etiqueta
          <select id="filtro-etiqueta"><option value="">Todas</option></select>
        </label>
        <label class="toggle"><input type="checkbox" id="ocultar-concluidas" /><span>Ocultar concluídas</span></label>
      </div>

      <div id="progresso" class="progresso" hidden>
        <div class="progresso-info"><span id="prog-texto"></span><span id="prog-pct"></span></div>
        <div class="progresso-barra"><div id="prog-fill" class="progresso-fill"></div></div>
      </div>

      <form id="form-tarefa" class="form-tarefa" hidden>
        <input id="nova-tarefa" type="text" placeholder="O que precisa ser feito?" maxlength="120" />
        <input id="nova-tarefa-etiqueta" type="text" placeholder="Etiqueta" maxlength="20" />
        <button type="submit">Adicionar</button>
      </form>

      <ul id="tarefas" class="tarefas"></ul>
      <p id="vazio" class="vazio">Crie uma lista para começar.</p>
    </main>

    <aside class="detalhe" id="detalhe" hidden>
      <div class="detalhe-topo">
        <button id="btn-fechar" class="btn-icone" title="Fechar" aria-label="Fechar"></button>
        <div class="detalhe-topo-dir">
          <button id="btn-fixar" class="btn-icone" title="Fixar no topo" aria-label="Fixar"></button>
          <button id="btn-excluir-tarefa" class="btn-perigo" title="Excluir tarefa"></button>
        </div>
      </div>
      <label class="campo-rotulo">Tarefa</label>
      <input id="det-titulo" class="det-titulo" type="text" maxlength="120" />
      <div class="det-linha">
        <input id="det-etiqueta" class="det-etiqueta" type="text" placeholder="Etiqueta" maxlength="20" />
        <label class="toggle"><input type="checkbox" id="det-status" /><span>Concluída</span></label>
      </div>
      <label class="campo-rotulo">Prazo</label>
      <input id="det-prazo" class="det-prazo" type="date" />
      <label class="campo-rotulo">Anotação</label>
      <div class="editor-toolbar" id="editor-toolbar">
        <button type="button" data-bloco="H1" title="Título">Título</button>
        <button type="button" data-bloco="H2" title="Subtítulo">Subtítulo</button>
        <button type="button" data-bloco="P" title="Corpo">Corpo</button>
        <span class="sep"></span>
        <button type="button" class="bold" data-cmd="bold" title="Negrito">N</button>
        <button type="button" class="ital" data-cmd="italic" title="Itálico">I</button>
        <button type="button" data-cmd="insertUnorderedList" title="Lista" aria-label="Lista"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></button>
      </div>
      <div id="det-anotacao" class="det-anotacao editor" contenteditable="true" data-placeholder="Escreva detalhes, ideias, links..."></div>
      <button id="btn-salvar" class="btn-salvar">Salvar alterações</button>
    </aside>
  </div>

  <div id="modal-lista" class="modal-overlay" hidden>
    <div class="modal-card">
      <h3>Nova lista</h3>
      <input id="modal-nome" class="modal-nome" type="text" placeholder="Nome da lista" maxlength="40" />
      <div class="cores" id="modal-cores"></div>
      <div class="modal-acoes">
        <button id="modal-cancelar" class="btn-sec">Cancelar</button>
        <button id="modal-criar" class="btn-pri">Criar lista</button>
      </div>
    </div>
  </div>

  <div id="toasts" class="toasts"></div>
  <script src="/js/app.js"></script>
</body>
</html>
